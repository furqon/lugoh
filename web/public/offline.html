<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />
    <title>Offline — AGOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f8fafc;
        --fg: #0f172a;
        --muted: #64748b;
        --accent: #4f46e5;
        --accent-light: #eef2ff;
        --border: #e2e8f0;
        --card: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #020617;
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --accent: #818cf8;
          --accent-light: #1e1b4b;
          --border: #1e293b;
          --card: #0f172a;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        padding: 3rem 2.5rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 1rem;
        background: var(--accent);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Noto Naskh Arabic', serif;
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 auto 1.5rem;
        box-shadow: 0 8px 24px -4px rgb(79 70 229 / 0.3);
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.25rem; }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.625rem 1.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        font-family: inherit;
        color: white;
        background: var(--accent);
        border: none;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: opacity 0.2s;
        text-decoration: none;
      }
      .btn:hover { opacity: 0.9; }
      .btn:active { opacity: 0.8; }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.75rem;
        color: var(--muted);
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon">📡</span>
      <div class="logo">ا</div>
      <h1>You're Offline</h1>
      <p>AGOS needs an internet connection to analyze Arabic text.</p>
      <p>The pipeline runs on the server and requires a network connection.</p>
      <button class="btn" onclick="window.location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Try Again
      </button>
      <p class="hint">
        AGOS · Arabic Grammar Operating System
      </p>
    </div>
  </body>
</html>
